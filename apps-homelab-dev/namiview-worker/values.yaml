nameOverride: namiview-worker-dev
replicaCount: 1
image:
  repository: 015301735477.dkr.ecr.eu-west-1.amazonaws.com/namiview-worker
  tag: "dev-e01a4f0"
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1500m
    memory: 6Gi
storage:
  backend: s3
  s3:
    bucket: namiview-dev-bucket
    region: eu-west-1
imagePullSecrets:
  - name: regcred
aws:
  staticCredentials:
    enabled: true
    secretName: aws-credentials
serviceAccount:
  create: true
  name: namiview-worker
  annotations: {}
jobs:
  queueUrl: "https://sqs.eu-west-1.amazonaws.com/015301735477/namiview-prod-dev-jobs"
app:
  mongo:
    atlas: true
    host: namiview.pj6elop.mongodb.net
    appName: namiview-dev
    # Isolate dev's images onto `dev-images` (matches namiview-api). Requires the
    # MONGO_COLLECTION knob added to the namiview-worker chart.
    collection: "dev-images"
    jobsCollection: "dev-jobs"
  # Model lineup — Namiview v2 + Physics (Light) only, matching prod.
  enabledModels: "nami-v2,physics-light"
vault:
  clusterSecretStore: aws-secrets-manager
  refreshInterval: "1h"
  paths:
    mongodb: namiview-prod/mongodb
    mongodbDb: namiview-prod/mongodb
metrics:
  enabled: true
  port: 9090
  serviceMonitor:
    enabled: true
