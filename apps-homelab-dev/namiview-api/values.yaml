nameOverride: namiview-api-dev
replicaCount: 1
image:
  repository: 015301735477.dkr.ecr.eu-west-1.amazonaws.com/namiview-api
  tag: "dev-2efccdb"
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
storage:
  backend: s3
  s3:
    bucket: namiview-dev-bucket
    region: eu-west-1
imagePullSecrets:
  - name: regcred
aws:
  staticCredentials:
    enabled: true
    secretName: aws-credentials
serviceAccount:
  create: true
  name: namiview-api
  annotations: {}
ingress:
  enabled: false
vault:
  clusterSecretStore: aws-secrets-manager
  refreshInterval: "1h"
  paths:
    mongodb: namiview-prod/mongodb
    mongodbDb: namiview-prod/mongodb
    googleCreds: namiview-prod/google-creds
    # dev signs JWTs with its own secret so dev-minted tokens are invalid in
    # prod. Requires namiview-prod/dev-jwt to exist (namiview-terraform#20). (namiview#285)
    jwt: namiview-prod/dev-jwt
app:
  googleRedirectUri: "https://dev.namiview.com/api/auth/callback"
  corsOrigins: "https://dev.namiview.com"
  mongo:
    atlas: true
    host: namiview.pj6elop.mongodb.net
    appName: namiview-dev
    # Isolate dev's images onto `dev-images`; without this dev shares prod's
    # default `images` collection (same Atlas DB) and dev deletes/tests wipe
    # prod gallery images. Must match the worker (apps-homelab-dev/namiview-worker).
    collection: "dev-images"
    # Must match the worker's collection (apps-homelab-dev/namiview-worker)
    # or the API reads "jobs" while the worker writes "dev-jobs" → status
    # never reaches the UI and uploads hang. (prod: both default to "jobs".)
    jobsCollection: "dev-jobs"
  # Model lineup — Namiview v2 + Physics (Light) only, matching prod.
  enabledModels: "nami-v2,physics-light"
jobs:
  queueUrl: "https://sqs.eu-west-1.amazonaws.com/015301735477/namiview-prod-dev-jobs"
metrics:
  enabled: true
  port: 9090
  serviceMonitor:
    enabled: true
grafanaDashboard:
  enabled: false
networkPolicy:
  enabled: false
PodDisruptionBudget:
  enabled: false
autoscaling:
  enabled: false
