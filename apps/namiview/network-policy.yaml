apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: namiview-app-egress
  namespace: namiview-app
spec:
  podSelector:
    matchLabels:
      app: namiview-app
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: namiview-infra
    ports:
    - protocol: TCP
      port: 27017
    - protocol: TCP
      port: 9000
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: vault
    ports:
    - protocol: TCP
      port: 8200
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0 # Allows the app to talk to the internet for Google auth
    ports:
    - protocol: TCP
      port: 443