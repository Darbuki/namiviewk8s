apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: namiview-app-security-policy
  namespace: namiview-app
spec:
  podSelector:
    matchLabels:
      app: namiview-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
    # 1. ALLOW Ingress from Cloudflare Tunnel Pods
    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: cloudflare
      ports:
      - protocol: TCP
        port: 8501
  egress:
    # 2. ALLOW Egress for DNS resolution
    - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
      ports:
      - protocol: UDP
        port: 53
    # 3. ALLOW Egress to MongoDB & Metrics (Infrastructure)
    - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: namiview-infra
      ports:
      - protocol: TCP
        port: 27017
      - protocol: TCP
        port: 9000
    # 4. ALLOW Egress to Vault
    - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: vault
      ports:
      - protocol: TCP
        port: 8200
    # 5. ALLOW Egress for External Auth (Google/OIDC)
    - to:
      - ipBlock:
          cidr: 0.0.0.0/0
      ports:
      - protocol: TCP
        port: 443