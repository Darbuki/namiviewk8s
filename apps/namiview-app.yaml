apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namiview-app
  namespace: argocd
  # Sync waves ensure this starts after infra if needed
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: git@github.com:darbuki/namiviewk8s.git
    targetRevision: argo_deployment
    path: apps/namiview  # <--- Points to the subfolder with your code
  destination:
    server: https://kubernetes.default.svc
    namespace: namiview-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true