apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namiview-dev-ui
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/Darbuki/namiview-charts.git
    targetRevision: dev
    path: charts/namiview-ui
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: namiview-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
