global:
  enabled: true
  tlsDisable: true # Stick to HTTP for Phase 1 to avoid certificate complexity

server:
  # 1. Enable UI so you can check your secrets in the browser
  ui:
    enabled: true
    serviceType: NodePort # This allows you to access Vault via VM_IP:Port
    # nodePort: 30820     # Optional: You can pin it to a specific port
  service:
    type: NodePort
    nodePort: 30820
  # 2. Configure Persistence to use your NFS StorageClass
  dataStorage:
    enabled: true
    size: 5Gi
    storageClass: "vault-nfs-storage" # Must match the metadata.name in your storage-class.yaml

  # 3. High Availability (HA) with Raft
  ha:
    enabled: true
    replicas: 1 # Start with 1 to make initialization easy, scale to 3 later
    raft:
      enabled: true
      setNodeId: true # Sets Raft ID to the Pod name (e.g., vault-0)
      config: |
        ui = true
        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        storage "raft" {
          path = "/vault/data"
        }
        # Required for Raft on some NFS setups to avoid lock issues
        disable_mlock = true 
        service_registration "kubernetes" {}