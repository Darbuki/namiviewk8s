apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Darbuki/namiviewk8s.git
    targetRevision: 88-bootstrap-dev-environment-in-eks-cluster-shape-2
    path: infrastructure-eks
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
