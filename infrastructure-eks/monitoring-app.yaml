apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: namiview
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 83.4.0
    helm:
      valuesObject:
        # Grafana
        grafana:
          enabled: true
          admin:
            existingSecret: grafana-admin-secret
            userKey: admin-user
            passwordKey: admin-password
          grafana.ini:
            server:
              root_url: https://grafana.eks.namiview.com
            auth.anonymous:
              enabled: true
              org_role: Viewer
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
            datasources:
              enabled: true
          service:
            type: ClusterIP
            port: 80

        # Prometheus
        prometheus:
          prometheusSpec:
            retention: 5d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false

        # AlertManager
        alertmanager:
          enabled: true
          alertmanagerSpec:
            # Trust matchers in AlertmanagerConfig CRDs as written, rather than
            # auto-scoping them to the CRD's own namespace. Required so that a
            # config living in (e.g.) namiview-agents can route cluster-wide
            # alerts. Default `OnNamespace` would silently inject a
            # `namespace=<crd-ns>` matcher and nothing would ever match.
            alertmanagerConfigMatcherStrategy:
              type: None
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 2Gi

        # Disable components not available on EKS managed control plane
        kubeEtcd:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
