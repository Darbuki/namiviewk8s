apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-set-terraform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: namiview
  sources:
    - repoURL: https://github.com/Darbuki/namiviewk8s.git
      targetRevision: 69-set-up-namiview-on-aws
      ref: values
    - repoURL: ghcr.io/actions/actions-runner-controller-charts
      chart: gha-runner-scale-set
      targetRevision: 0.14.0
      helm:
        releaseName: arc-runner-set-terraform
        valueFiles:
          - $values/infrastructure-eks/arc-runner-set-terraform/values.yaml
    - repoURL: https://github.com/Darbuki/namiviewk8s.git
      targetRevision: 69-set-up-namiview-on-aws
      path: infrastructure-eks/arc-runner-set-terraform
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
