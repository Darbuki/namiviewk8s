apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arc-github-token-terraform
  namespace: arc-runners
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: arc-github-token-terraform
  data:
    - secretKey: github_token
      remoteRef:
        key: namiview-prod/arc-github-token
        property: github_token
