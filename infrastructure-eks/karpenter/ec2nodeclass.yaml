apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # Use the latest EKS-optimized Amazon Linux 2023 AMI
  amiSelectorTerms:
    - alias: al2023@latest

  # Discover subnets and security groups by tag
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: namiview-prod

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: namiview-prod

  # The IAM role Karpenter-launched nodes will use
  role: KarpenterNodeRole-namiview-prod
