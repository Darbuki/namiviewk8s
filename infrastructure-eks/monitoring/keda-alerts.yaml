apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: keda-alerts
  namespace: monitoring
  labels:
    release: monitoring-stack
    app: kube-prometheus-stack
spec:
  groups:
    - name: keda
      rules:
        - alert: KEDAScalerErrors
          expr: |
            sum by (exported_namespace, scaledObject, scaler) (
              rate(keda_scaler_errors_total[5m])
            ) > 0
          for: 10m
          labels:
            severity: warning
            component: keda
          annotations:
            summary: "KEDA scaler {{ $labels.scaler }} returning errors for {{ $labels.exported_namespace }}/{{ $labels.scaledObject }}"
            description: |
              KEDA scaler '{{ $labels.scaler }}' on ScaledObject
              {{ $labels.exported_namespace }}/{{ $labels.scaledObject }}
              has been failing for 10m+. The HPA keeps using the last known
              metric value (or minReplicas if it never had one). Autoscaling
              is degraded but not loud — investigate scaler auth/network.
            runbook_url: "https://keda.sh/docs/latest/troubleshooting/"
