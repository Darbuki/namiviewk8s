apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tailscale-operator-oauth
  namespace: tailscale
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: operator-oauth
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: namiview-prod/tailscale-operator-oauth
