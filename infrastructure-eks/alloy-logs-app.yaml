apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy-logs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: namiview
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: 1.8.0
    helm:
      valuesObject:
        controller:
          type: daemonset

        alloy:
          enableReporting: false
          securityContext:
            privileged: true
            runAsUser: 0
          mounts:
            varlog: true
          extraEnv:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          configMap:
            content: |
              discovery.kubernetes "pods" {
                role = "pod"

                selectors {
                  role  = "pod"
                  field = "spec.nodeName=" + sys.env("K8S_NODE_NAME")
                }
              }

              discovery.relabel "namiview_pod_logs" {
                targets = discovery.kubernetes.pods.targets

                rule {
                  action        = "keep"
                  source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                  separator     = "/"
                  regex         = "namiview/(namiview-api|namiview-ui)|namiview-dev/(namiview-api|namiview-ui|namiview-worker)"
                }

                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_namespace"]
                  regex         = "namiview"
                  replacement   = "prod"
                  target_label  = "environment"
                }

                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_namespace"]
                  regex         = "namiview-dev"
                  replacement   = "dev"
                  target_label  = "environment"
                }

                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }

                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }

                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }

                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  target_label  = "node"
                }

                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                  target_label  = "app"
                }

                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_instance"]
                  target_label  = "release"
                }

                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                  separator     = "/"
                  target_label  = "job"
                }

                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
                  separator     = "/"
                  replacement   = "/var/log/pods/*$1/*.log"
                  target_label  = "__path__"
                }

                rule {
                  action        = "replace"
                  source_labels = [
                    "__meta_kubernetes_pod_annotationpresent_kubernetes_io_config_hash",
                    "__meta_kubernetes_pod_annotation_kubernetes_io_config_hash",
                    "__meta_kubernetes_pod_container_name",
                  ]
                  separator     = "/"
                  regex         = "true/(.*)"
                  replacement   = "/var/log/pods/*$1/*.log"
                  target_label  = "__path__"
                }
              }

              local.file_match "namiview_pod_logs" {
                path_targets = discovery.relabel.namiview_pod_logs.output
              }

              loki.source.file "namiview_pod_logs" {
                targets    = local.file_match.namiview_pod_logs.targets
                forward_to = [loki.write.default.receiver]
              }

              loki.write "default" {
                endpoint {
                  url = "http://loki-gateway.logging.svc.cluster.local/loki/api/v1/push"
                }
              }
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
