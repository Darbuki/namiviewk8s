apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault-connection
  namespace: namiview-app
spec:
  address: http://vault.vault.svc.cluster.local:8200

---

apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: namiview-auth
  namespace: namiview-app
spec:
  vaultConnectionRef: vault-connection
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: namiview-app-role        
    serviceAccount: namiview-app-sa 
    # REMOVED: namespace field was causing the BadRequest