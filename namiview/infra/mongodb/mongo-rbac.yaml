apiVersion: v1
kind: ServiceAccount
metadata:
  name: mongo-sidecar-sa
  namespace: namiview-infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mongo-sidecar-cluster-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mongo-sidecar-cluster-rb  # No namespace here
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mongo-sidecar-cluster-role
subjects:
  - kind: ServiceAccount
    name: mongo-sidecar-sa
    namespace: namiview-infra