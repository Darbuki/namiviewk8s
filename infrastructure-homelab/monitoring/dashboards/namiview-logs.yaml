apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-namiview-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  namiview-logs.json: |
    {
      "uid": "namiview-logs",
      "title": "Namiview · Logs",
      "tags": ["namiview", "logs"],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {"type": "loki", "uid": "loki"},
            "query": {"label": "namespace", "refId": "LabelValues"},
            "current": {"text": "namiview-dev", "value": "namiview-dev"},
            "refresh": 1
          },
          {
            "name": "service",
            "type": "query",
            "datasource": {"type": "loki", "uid": "loki"},
            "query": {"label": "service", "refId": "LabelValues",
                      "stream": "{namespace=\"$namespace\"}"},
            "current": {"text": "All", "value": "$__all"},
            "includeAll": true,
            "multi": true,
            "refresh": 1
          },
          {
            "name": "level",
            "type": "custom",
            "query": "All,error,warning,info,debug",
            "current": {"text": "All", "value": "$__all"},
            "includeAll": true,
            "multi": true
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Log volume by service",
          "type": "timeseries",
          "datasource": {"type": "loki", "uid": "loki"},
          "gridPos": {"x": 0, "y": 0, "w": 16, "h": 6},
          "targets": [
            {"expr": "sum by (service) (count_over_time({namespace=\"$namespace\", service=~\"$service\"}[1m]))",
             "legendFormat": "{{service}}"}
          ]
        },
        {
          "id": 2,
          "title": "Errors / minute (last hour)",
          "type": "stat",
          "datasource": {"type": "loki", "uid": "loki"},
          "gridPos": {"x": 16, "y": 0, "w": 8, "h": 6},
          "targets": [
            {"expr": "sum (count_over_time({namespace=\"$namespace\", service=~\"$service\"} |~ \"(?i)error|exception|traceback\" [1m]))",
             "legendFormat": "errors/min"}
          ],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"},
            "thresholds": {"mode": "absolute", "steps": [
              {"color": "green", "value": null},
              {"color": "yellow", "value": 1},
              {"color": "red", "value": 10}
            ]}}}
        },
        {
          "id": 3,
          "title": "Recent errors (api+worker)",
          "type": "logs",
          "datasource": {"type": "loki", "uid": "loki"},
          "gridPos": {"x": 0, "y": 6, "w": 24, "h": 10},
          "targets": [
            {"expr": "{namespace=\"$namespace\", service=~\"$service\"} |~ \"(?i)error|exception|traceback\"",
             "maxLines": 200}
          ],
          "options": {"showTime": true, "showLabels": false, "wrapLogMessage": true, "sortOrder": "Descending"}
        },
        {
          "id": 4,
          "title": "All logs (filterable)",
          "type": "logs",
          "datasource": {"type": "loki", "uid": "loki"},
          "gridPos": {"x": 0, "y": 16, "w": 24, "h": 12},
          "targets": [
            {"expr": "{namespace=\"$namespace\", service=~\"$service\"}",
             "maxLines": 500}
          ],
          "options": {"showTime": true, "showLabels": false, "wrapLogMessage": true, "sortOrder": "Descending"}
        }
      ]
    }
