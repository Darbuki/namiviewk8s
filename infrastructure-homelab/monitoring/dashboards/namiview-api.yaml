apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-namiview-api
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  namiview-api.json: |
    {
      "uid": "namiview-api",
      "title": "Namiview · API",
      "tags": ["namiview"],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "label_values(http_requests_total{handler=~\"/api.*\"}, namespace)",
            "current": {"text": "namiview-dev", "value": "namiview-dev"},
            "refresh": 1,
            "sort": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Request rate by route",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [
            {"expr": "sum by (handler) (rate(http_requests_total{namespace=\"$namespace\", handler=~\"/api.*\"}[5m]))",
             "legendFormat": "{{handler}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "id": 2,
          "title": "Error rate (4xx/5xx)",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "targets": [
            {"expr": "sum by (status) (rate(http_requests_total{namespace=\"$namespace\", status=~\"4..|5..\"}[5m]))",
             "legendFormat": "{{status}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "id": 3,
          "title": "Latency p50 / p95 / p99",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"x": 0, "y": 8, "w": 12, "h": 8},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"$namespace\"}[5m])))",
             "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"$namespace\"}[5m])))",
             "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"$namespace\"}[5m])))",
             "legendFormat": "p99"}
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "id": 4,
          "title": "Latency p95 by route",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"x": 12, "y": 8, "w": 12, "h": 8},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum by (handler, le) (rate(http_request_duration_seconds_bucket{namespace=\"$namespace\", handler=~\"/api.*\"}[5m])))",
             "legendFormat": "{{handler}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "id": 5,
          "title": "HTTP status breakdown",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"x": 0, "y": 16, "w": 8, "h": 5},
          "targets": [
            {"expr": "sum by (status) (rate(http_requests_total{namespace=\"$namespace\"}[5m]))",
             "legendFormat": "{{status}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "id": 6,
          "title": "Images uploaded (counter)",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"x": 8, "y": 16, "w": 8, "h": 5},
          "targets": [
            {"expr": "sum(namiview_images_uploaded_total{namespace=\"$namespace\"})",
             "legendFormat": "uploaded"}
          ]
        },
        {
          "id": 7,
          "title": "Images saved to gallery (counter)",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"x": 16, "y": 16, "w": 8, "h": 5},
          "targets": [
            {"expr": "sum(namiview_images_saved_total{namespace=\"$namespace\"})",
             "legendFormat": "saved"}
          ]
        }
      ]
    }
