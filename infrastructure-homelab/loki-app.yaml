apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: namiview
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 7.0.0
    helm:
      valuesObject:
        deploymentMode: SingleBinary

        # ── Loki core config ──────────────────────────────────────────────
        loki:
          # Anonymous, single-tenant mode — fine for a homelab.
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          # Chunks + ruler/admin → s3 (namiview-loki-logs, eu-west-1).
          # Credentials are injected as env vars via singleBinary.extraEnv
          # below; the chart reads AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
          # from the pod env (same pattern yace uses for CloudWatch).
          storage:
            type: s3
            bucketNames:
              chunks: namiview-loki-logs
              ruler: namiview-loki-logs
              admin: namiview-loki-logs
            s3:
              region: eu-west-1
              s3forcepathstyle: false
          # Two schema entries:
          #   - 2024-04-01..2026-05-26: filesystem chunks on the local-path
          #     PVC. Kept for historical context; these chunks are NOT
          #     queryable once we cut over (filesystem store is removed),
          #     but the PVC itself is left mounted for forensic recovery.
          #   - 2026-05-27 onwards: tsdb on s3.
          #     (Originally planned for 2026-05-28 but moved up — the chart's
          #     new top-level `storage.type: s3` unset the filesystem chunks
          #     directory, so the old schema's writes were failing with
          #     `mkdir fake: read-only file system`. Cutting over today makes
          #     all new writes go to S3 immediately.)
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
              - from: "2026-05-27"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

        # Single-binary chunk cache is in-process; disable memcached/results
        # cache so we don't pull in extra workloads we don't need on one node.
        # (These are root-level keys in the grafana/loki chart, not under `loki:`.)
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false

        # Canary pushes test logs to Loki — not useful on a single node.
        lokiCanary:
          enabled: false

        # ── Single-binary deployment ──────────────────────────────────────
        singleBinary:
          replicas: 1
          # PVC stays mounted: Loki uses it for WAL + ingester-side state
          # even when chunks live in s3. Old filesystem chunks remain on
          # disk for forensic recovery (not queryable after the cutover).
          persistence:
            enabled: true
            storageClass: local-path
            accessModes: ["ReadWriteOnce"]
            size: 30Gi
          # AWS creds for s3 storage. Copy the bootstrap secret into the
          # monitoring namespace once at install time (same one-liner used
          # for yace):
          #   kubectl get secret aws-credentials -n external-secrets -o yaml \
          #     | sed '/namespace:/d' | kubectl apply -n monitoring -f -
          extraEnv:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: secret-access-key
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi

        # ── Disable the scalable-mode components (we're single-binary) ────
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0

        # ── Disable extras we don't need on a homelab ─────────────────────
        # Self-monitoring stack pulls in Grafana Agent; we ship logs via Alloy.
        monitoring:
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false

        # Disable the test pod so we don't get a leftover Helm test artifact.
        test:
          enabled: false

        # Gateway (nginx in front of Loki) — we don't need it for in-cluster scrape.
        gateway:
          enabled: false

        # Expose a ServiceMonitor so Prometheus scrapes Loki's own metrics.
        serviceMonitor:
          enabled: true
          labels:
            release: monitoring-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
