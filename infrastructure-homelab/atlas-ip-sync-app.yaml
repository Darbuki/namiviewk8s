apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atlas-ip-sync
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: namiview
  source:
    repoURL: https://github.com/Darbuki/namiviewk8s.git
    targetRevision: main
    path: infrastructure-homelab/atlas-ip-sync
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
