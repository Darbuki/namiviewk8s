apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-ip-sync-script
  namespace: external-secrets
data:
  sync.sh: |
    #!/bin/sh
    # Keep the homelab's current public egress IP allowlisted in MongoDB Atlas.
    # Idempotent: identifies its own entries via comment="homelab-auto", removes
    # stale ones, adds the current one.
    set -euo pipefail

    apk add --no-cache --quiet curl jq >/dev/null

    CURRENT_IP=$(curl -fsS --max-time 10 https://ifconfig.me)
    echo "Current public IP: $CURRENT_IP"

    COMMENT="homelab-auto"
    AUTH="--digest -u $ATLAS_PUBLIC_KEY:$ATLAS_PRIVATE_KEY"
    API="https://cloud.mongodb.com/api/atlas/v2/groups/$ATLAS_PROJECT_ID/accessList"
    HDR_ACCEPT="Accept: application/vnd.atlas.2023-01-01+json"

    EXISTING=$(curl -fsS $AUTH -H "$HDR_ACCEPT" "$API?itemsPerPage=500")
    echo "Atlas API response:"
    echo "$EXISTING"
    OLD_IPS=$(echo "$EXISTING" | jq -r --arg c "$COMMENT" '(.results // []) | .[] | select(.comment == $c) | (.ipAddress // .cidrBlock)')

    already_present=0
    for ip in $OLD_IPS; do
      if [ "$ip" = "$CURRENT_IP" ] || [ "$ip" = "$CURRENT_IP/32" ]; then
        already_present=1
      fi
    done

    if [ "$already_present" = "1" ]; then
      echo "Current IP already allowlisted — nothing to add."
    else
      echo "Adding $CURRENT_IP to Atlas allowlist"
      curl -fsS $AUTH -H "$HDR_ACCEPT" -H "Content-Type: application/json" \
        -X POST "$API" \
        -d "[{\"ipAddress\":\"$CURRENT_IP\",\"comment\":\"$COMMENT\"}]" >/dev/null
    fi

    for ip in $OLD_IPS; do
      if [ "$ip" != "$CURRENT_IP" ] && [ "$ip" != "$CURRENT_IP/32" ]; then
        # The API accepts the entry key as either the bare IP or url-encoded CIDR.
        key=$(printf '%s' "$ip" | sed 's|/|%2F|g')
        echo "Removing stale allowlist entry: $ip"
        curl -fsS $AUTH -H "$HDR_ACCEPT" -X DELETE "$API/$key" >/dev/null
      fi
    done

    echo "Done."
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: atlas-ip-sync
  namespace: external-secrets
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: alpine:3.20
              command: ["/bin/sh", "/scripts/sync.sh"]
              env:
                - name: ATLAS_PUBLIC_KEY
                  valueFrom:
                    secretKeyRef:
                      name: atlas-api-credentials
                      key: public_key
                - name: ATLAS_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: atlas-api-credentials
                      key: private_key
                - name: ATLAS_PROJECT_ID
                  valueFrom:
                    secretKeyRef:
                      name: atlas-api-credentials
                      key: project_id
              volumeMounts:
                - name: script
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: script
              configMap:
                name: atlas-ip-sync-script
                defaultMode: 0755
