apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-ip-sync-script
  namespace: external-secrets
data:
  sync.sh: |
    #!/bin/sh
    # Keep the homelab's current public egress IP allowlisted in MongoDB Atlas.
    set -eu

    apk add --no-cache --quiet curl jq >/dev/null

    COMMENT="homelab-auto"
    # Atlas v2's self-link names this resource `whitelist`. Docs sometimes
    # refer to it as accessList(s) but the API treats those as unknown sub-paths.
    API="https://cloud.mongodb.com/api/atlas/v2/groups/$ATLAS_PROJECT_ID/whitelist"
    AUTH_USER="$ATLAS_PUBLIC_KEY:$ATLAS_PRIVATE_KEY"
    ACCEPT="application/vnd.atlas.2023-01-01+json"

    CURRENT_IP=$(curl -fsS --max-time 10 https://ifconfig.me)
    echo "Current public IP: $CURRENT_IP"

    echo "=== GET access list ==="
    BODY_FILE=$(mktemp)
    CODE=$(curl -sS --digest -u "$AUTH_USER" -H "Accept: $ACCEPT" \
      "$API?itemsPerPage=500" -o "$BODY_FILE" -w "%{http_code}")
    echo "HTTP $CODE"
    echo "Body:"; cat "$BODY_FILE"; echo
    [ "${CODE%??}" = "2" ] || { echo "ABORT: GET failed"; exit 1; }

    OLD_IPS=$(jq -r --arg c "$COMMENT" '(.results // []) | .[] | select(.comment == $c) | (.ipAddress // .cidrBlock)' < "$BODY_FILE")
    echo "Old auto-managed entries: ${OLD_IPS:-<none>}"

    already_present=0
    for ip in $OLD_IPS; do
      if [ "$ip" = "$CURRENT_IP" ] || [ "$ip" = "$CURRENT_IP/32" ]; then
        already_present=1
      fi
    done

    if [ "$already_present" = "1" ]; then
      echo "Current IP already allowlisted."
    else
      echo "=== POST add $CURRENT_IP ==="
      PAYLOAD="[{\"ipAddress\":\"$CURRENT_IP\",\"comment\":\"$COMMENT\"}]"
      echo "Payload: $PAYLOAD"
      CODE=$(curl -sS --digest -u "$AUTH_USER" \
        -H "Accept: $ACCEPT" -H "Content-Type: application/json" \
        -X POST "$API" -d "$PAYLOAD" \
        -o "$BODY_FILE" -w "%{http_code}")
      echo "HTTP $CODE"
      echo "Body:"; cat "$BODY_FILE"; echo
      [ "${CODE%??}" = "2" ] || { echo "ABORT: POST failed"; exit 1; }
    fi

    for ip in $OLD_IPS; do
      if [ "$ip" != "$CURRENT_IP" ] && [ "$ip" != "$CURRENT_IP/32" ]; then
        key=$(printf '%s' "$ip" | sed 's|/|%2F|g')
        echo "=== DELETE stale: $ip ==="
        CODE=$(curl -sS --digest -u "$AUTH_USER" -H "Accept: $ACCEPT" \
          -X DELETE "$API/$key" -o "$BODY_FILE" -w "%{http_code}")
        echo "HTTP $CODE"
        echo "Body:"; cat "$BODY_FILE"; echo
      fi
    done

    rm -f "$BODY_FILE"
    echo "Done."
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: atlas-ip-sync
  namespace: external-secrets
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: alpine:3.20
              command: ["/bin/sh", "/scripts/sync.sh"]
              env:
                - name: ATLAS_PUBLIC_KEY
                  valueFrom:
                    secretKeyRef:
                      name: atlas-api-credentials
                      key: public_key
                - name: ATLAS_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: atlas-api-credentials
                      key: private_key
                - name: ATLAS_PROJECT_ID
                  valueFrom:
                    secretKeyRef:
                      name: atlas-api-credentials
                      key: project_id
              volumeMounts:
                - name: script
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: script
              configMap:
                name: atlas-ip-sync-script
                defaultMode: 0755
