apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-ip-sync-script
  namespace: external-secrets
data:
  sync.sh: |
    #!/bin/sh
    # Keep the homelab's current public egress IP allowlisted in MongoDB Atlas.
    # Idempotent: identifies its own entries via comment="homelab-auto", removes
    # stale ones, adds the current one.
    set -euo pipefail

    apk add --no-cache --quiet curl jq >/dev/null

    # Helper: run curl, print HTTP code + body, fail on non-2xx.
    # Args: METHOD URL [DATA]
    atlas_curl() {
      method="$1"; url="$2"; data="${3:-}"
      tmp=$(mktemp)
      if [ -n "$data" ]; then
        code=$(curl -sS --digest -u "$ATLAS_PUBLIC_KEY:$ATLAS_PRIVATE_KEY" \
          -H "Accept: application/vnd.atlas.2023-01-01+json" \
          -H "Content-Type: application/json" \
          -X "$method" "$url" -d "$data" \
          -o "$tmp" -w "%{http_code}")
      else
        code=$(curl -sS --digest -u "$ATLAS_PUBLIC_KEY:$ATLAS_PRIVATE_KEY" \
          -H "Accept: application/vnd.atlas.2023-01-01+json" \
          -X "$method" "$url" \
          -o "$tmp" -w "%{http_code}")
      fi
      echo "  -> $method $url"
      echo "  -> HTTP $code"
      echo "  -> body:"
      sed 's/^/     /' "$tmp"
      cat "$tmp"   # to stdout so caller can capture body
      rm -f "$tmp"
      [ "${code%??}" = "2" ]
    }

    CURRENT_IP=$(curl -fsS --max-time 10 https://ifconfig.me)
    echo "Current public IP: $CURRENT_IP"

    COMMENT="homelab-auto"
    API="https://cloud.mongodb.com/api/atlas/v2/groups/$ATLAS_PROJECT_ID/accessLists"

    echo "=== Listing current access list entries ==="
    EXISTING=$(atlas_curl GET "$API?itemsPerPage=500" 2>&1 | tail -n +5)
    # ^^ tail strips our diagnostic lines, keeps only the body

    # Re-fetch cleanly for jq (without diagnostic noise)
    EXISTING_BODY=$(curl -sS --digest -u "$ATLAS_PUBLIC_KEY:$ATLAS_PRIVATE_KEY" \
      -H "Accept: application/vnd.atlas.2023-01-01+json" \
      "$API?itemsPerPage=500")

    OLD_IPS=$(echo "$EXISTING_BODY" | jq -r --arg c "$COMMENT" '(.results // []) | .[] | select(.comment == $c) | (.ipAddress // .cidrBlock)')
    echo "Old auto-managed entries: ${OLD_IPS:-<none>}"

    already_present=0
    for ip in $OLD_IPS; do
      if [ "$ip" = "$CURRENT_IP" ] || [ "$ip" = "$CURRENT_IP/32" ]; then
        already_present=1
      fi
    done

    if [ "$already_present" = "1" ]; then
      echo "Current IP already allowlisted — nothing to add."
    else
      echo "=== Adding $CURRENT_IP to Atlas allowlist ==="
      atlas_curl POST "$API" "{\"ipAddress\":\"$CURRENT_IP\",\"comment\":\"$COMMENT\"}" >/dev/null
    fi

    for ip in $OLD_IPS; do
      if [ "$ip" != "$CURRENT_IP" ] && [ "$ip" != "$CURRENT_IP/32" ]; then
        key=$(printf '%s' "$ip" | sed 's|/|%2F|g')
        echo "=== Removing stale allowlist entry: $ip ==="
        atlas_curl DELETE "$API/$key" >/dev/null
      fi
    done

    echo "Done."
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: atlas-ip-sync
  namespace: external-secrets
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: alpine:3.20
              command: ["/bin/sh", "/scripts/sync.sh"]
              env:
                - name: ATLAS_PUBLIC_KEY
                  valueFrom:
                    secretKeyRef:
                      name: atlas-api-credentials
                      key: public_key
                - name: ATLAS_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: atlas-api-credentials
                      key: private_key
                - name: ATLAS_PROJECT_ID
                  valueFrom:
                    secretKeyRef:
                      name: atlas-api-credentials
                      key: project_id
              volumeMounts:
                - name: script
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: script
              configMap:
                name: atlas-ip-sync-script
                defaultMode: 0755
