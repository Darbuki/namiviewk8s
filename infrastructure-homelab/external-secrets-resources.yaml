apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: namiview
  source:
    repoURL: https://github.com/Darbuki/namiviewk8s.git
    targetRevision: 103-hybrid-homelab-aws-move-compute-from-eks-to-homelab
    path: infrastructure-homelab/external-secrets-resources
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
