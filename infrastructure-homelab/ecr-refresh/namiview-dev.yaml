apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-refresh
  namespace: namiview-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-refresh
  namespace: namiview-dev
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-refresh
  namespace: namiview-dev
subjects:
  - kind: ServiceAccount
    name: ecr-refresh
    namespace: namiview-dev
roleRef:
  kind: Role
  name: ecr-refresh
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-refresh
  namespace: namiview-dev
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-refresh
          restartPolicy: OnFailure
          containers:
            - name: ecr-refresh
              image: amazon/aws-cli:2.34.46
              command: ["/bin/sh", "-c"]
              env:
                - name: AWS_REGION
                  value: eu-west-1
                - name: ECR_REGISTRY
                  value: "015301735477.dkr.ecr.eu-west-1.amazonaws.com"
                - name: NAMESPACE
                  value: namiview-dev
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: secret-access-key
              args:
                - |
                  set -e
                  TOKEN=$(aws ecr get-login-password --region "$AWS_REGION")
                  AUTH=$(printf 'AWS:%s' "$TOKEN" | base64 -w0)
                  DOCKERCONFIG=$(printf '{"auths":{"%s":{"auth":"%s"}}}' "$ECR_REGISTRY" "$AUTH" | base64 -w0)
                  SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  API=https://kubernetes.default.svc
                  PAYLOAD=$(printf '{"apiVersion":"v1","kind":"Secret","metadata":{"name":"regcred","namespace":"%s"},"type":"kubernetes.io/dockerconfigjson","data":{".dockerconfigjson":"%s"}}' "$NAMESPACE" "$DOCKERCONFIG")
                  curl -sS --cacert "$CACERT" \
                    -H "Authorization: Bearer $SA_TOKEN" \
                    -H "Content-Type: application/apply-patch+yaml" \
                    -X PATCH "$API/api/v1/namespaces/$NAMESPACE/secrets/regcred?fieldManager=ecr-refresh&force=true" \
                    -d "$PAYLOAD"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
