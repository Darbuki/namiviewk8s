apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-cluster-gateway
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
  data:
    - secretKey: admin-user
      remoteRef:
        key: namiview/infra/monitoring/grafana
        property: adminUser
    - secretKey: admin-password
      remoteRef:
        key: namiview/infra/monitoring/grafana
        property: adminPassword
