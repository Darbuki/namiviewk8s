global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: minio/minio
  tag: RELEASE.2025-09-07T16-13-09Z
  pullPolicy: IfNotPresent

auth:
  existingSecret: "minio-auth-secret"
  rootUserSecretKey: "minio-root-user"
  rootPasswordSecretKey: "minio-root-password"

console:
  enabled: false
service:
  type: ClusterIP
  extraPorts:
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP
command: ["/bin/sh", "-c"]
args: ["minio server /bitnami/minio/data --console-address :9001"]

persistence:
  enabled: true
  size: 10Gi