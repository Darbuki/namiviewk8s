apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: namiview-infra

resources:
  - external-secret.yaml

helmCharts:
  - name: minio
    includeCRDs: true
    releaseName: minio
    version: 17.0.21 
    repo: oci://registry-1.docker.io/bitnamicharts
    valuesFile: values.yaml