apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arc-github-token-cluster-ops
  namespace: arc-runners
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-cluster-gateway
    kind: ClusterSecretStore
  target:
    name: arc-github-token-cluster-ops
  data:
    - secretKey: github_token
      remoteRef:
        key: github/runners-pat
        property: value
