apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: namiview-infra

helmCharts:
  - name: mongodb
    repo: oci://registry-1.docker.io/bitnamicharts
    version: 18.3.0
    releaseName: mongo
    valuesInline:
      architecture: replicaset
      replicaCount: 3
      auth:
        enabled: false
      persistence:
        enabled: true
        size: 3Gi
      podAntiAffinityPreset: soft
      resources:
        requests:
          cpu: 100m
          memory: 512Mi