apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:darbuki/namiviewk8s.git
    targetRevision: argo_deployment
    path: infrastructure/vault
    directory:
      recurse: true    
  destination:
    server: https://kubernetes.default.svc
    namespace: vault # Vault only
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true