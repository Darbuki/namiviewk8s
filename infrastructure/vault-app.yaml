apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:darbuki/namiviewk8s.git
    targetRevision: argo_deployment
    path: infrastructure/vault
    # THIS BLOCK IS THE FIX:
    kustomize:
      version: v5 # Or the version your ArgoCD supports
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true