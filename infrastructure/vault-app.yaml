apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:darbuki/namiviewk8s.git
    targetRevision: 54-set-up-self-hosted-github-actions-runner-on-cluster
    path: infrastructure/vault
    kustomize: {} 
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true