# Grafana Operator - minimal config (operator only, no Grafana instance)
namespaceScope: false
replicas: 2

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi

securityContext:
  capabilities:
    drop:
      - ALL
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
