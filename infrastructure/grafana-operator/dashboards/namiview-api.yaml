apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: namiview-api
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  json: >
    {
      "annotations": { "list": [] },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "blue", "value": null }] },
              "mappings": []
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto" },
          "title": "Unique Users",
          "type": "stat",
          "targets": [{ "expr": "namiview_unique_users{namespace=~\"$namespace\"}", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }] },
              "mappings": []
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto" },
          "title": "Gallery Images",
          "type": "stat",
          "targets": [{ "expr": "namiview_gallery_images{namespace=~\"$namespace\"}", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "orange", "value": null }] },
              "mappings": []
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "id": 3,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto" },
          "title": "Images Uploaded (24h)",
          "type": "stat",
          "targets": [{ "expr": "sum(increase(namiview_images_uploaded_total{namespace=~\"$namespace\"}[24h]))", "legendFormat": "" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "purple", "value": null }] },
              "mappings": []
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "id": 4,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto" },
          "title": "Images Saved (24h)",
          "type": "stat",
          "targets": [{ "expr": "sum(increase(namiview_images_saved_total{namespace=~\"$namespace\"}[24h]))", "legendFormat": "" }]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 101,
          "title": "Activity",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 15, "lineWidth": 2, "pointSize": 5, "showPoints": "auto", "spanNulls": false },
              "unit": "ops"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "id": 5,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Image Activity Rate",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(rate(namiview_images_uploaded_total{namespace=~\"$namespace\"}[$__rate_interval]))", "legendFormat": "Uploaded" },
            { "expr": "sum(rate(namiview_images_saved_total{namespace=~\"$namespace\"}[$__rate_interval]))", "legendFormat": "Saved" },
            { "expr": "sum(rate(namiview_images_deleted_total{namespace=~\"$namespace\"}[$__rate_interval]))", "legendFormat": "Deleted" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 15, "lineWidth": 2, "pointSize": 5, "showPoints": "auto", "spanNulls": false },
              "unit": "ops"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "id": 6,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "User Activity",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(rate(namiview_logins_total{namespace=~\"$namespace\"}[$__rate_interval]))", "legendFormat": "Logins" },
            { "expr": "sum(rate(namiview_metadata_edits_total{namespace=~\"$namespace\"}[$__rate_interval]))", "legendFormat": "Metadata Edits" }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 102,
          "title": "Processing",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "bars", "fillOpacity": 80, "lineWidth": 1, "stacking": { "mode": "normal" } },
              "unit": "ops"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "id": 7,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Processing Rate by Mode",
          "type": "timeseries",
          "targets": [
            { "expr": "sum by (mode) (rate(namiview_images_processed_total{namespace=~\"$namespace\"}[$__rate_interval]))", "legendFormat": "{{mode}}" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "pointSize": 5, "showPoints": "auto", "spanNulls": false },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "id": 8,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Processing Duration (p50 / p95 / p99)",
          "type": "timeseries",
          "targets": [
            { "expr": "histogram_quantile(0.50, sum by (le, pipeline) (rate(namiview_processing_duration_seconds_bucket{namespace=~\"$namespace\"}[$__rate_interval])))", "legendFormat": "p50 {{pipeline}}" },
            { "expr": "histogram_quantile(0.95, sum by (le, pipeline) (rate(namiview_processing_duration_seconds_bucket{namespace=~\"$namespace\"}[$__rate_interval])))", "legendFormat": "p95 {{pipeline}}" },
            { "expr": "histogram_quantile(0.99, sum by (le, pipeline) (rate(namiview_processing_duration_seconds_bucket{namespace=~\"$namespace\"}[$__rate_interval])))", "legendFormat": "p99 {{pipeline}}" }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 103,
          "title": "Errors & Upload Sizes",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 30, "lineWidth": 2, "pointSize": 5, "showPoints": "auto", "spanNulls": false },
              "unit": "ops",
              "color": { "mode": "palette-classic" }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "id": 9,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Error Rate by Operation",
          "type": "timeseries",
          "targets": [
            { "expr": "sum by (operation) (rate(namiview_errors_total{namespace=~\"$namespace\"}[$__rate_interval]))", "legendFormat": "{{operation}}" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "bars", "fillOpacity": 80, "lineWidth": 1 },
              "unit": "decbytes"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "id": 10,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single" } },
          "title": "Upload Size Distribution",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(increase(namiview_upload_size_bytes_bucket{namespace=~\"$namespace\"}[$__rate_interval])) by (le)", "legendFormat": "{{le}}", "format": "heatmap" }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["namiview-api"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "prometheus" },
            "hide": 0,
            "includeAll": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(namiview_images_uploaded_total, namespace)",
            "hide": 0,
            "includeAll": true,
            "multi": false,
            "name": "namespace",
            "query": { "query": "label_values(namiview_images_uploaded_total, namespace)", "refId": "ns" },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-24h", "to": "now" },
      "title": "Namiview API",
      "uid": "namiview-api-app",
      "version": 1
    }
