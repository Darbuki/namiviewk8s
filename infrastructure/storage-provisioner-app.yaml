apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage-provisioner
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:darbuki/namiviewk8s.git
    targetRevision: main
    path: infrastructure/storage-provisioner
  destination:
    server: https://kubernetes.default.svc
    namespace: local-path-storage # Clean, dedicated namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true