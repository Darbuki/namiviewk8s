apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vault

helmCharts:
  - name: vault
    repo: https://helm.releases.hashicorp.com
    version: 0.32.0
    releaseName: vault
    valuesInline:
      server:
        ha:
          enabled: true
          raft:
            enabled: true
            setNodeId: true
        dataStorage:
          enabled: true
          size: 3Gi