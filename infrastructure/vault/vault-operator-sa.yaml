---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-exec-operator
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: vault
  name: vault-exec-operator-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: vault
  name: vault-exec-operator-rolebinding
subjects:
- kind: ServiceAccount
  name: vault-exec-operator
  namespace: vault
roleRef:
  kind: Role
  name: vault-exec-operator-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-exec-operator-token
  namespace: vault
  annotations:
    kubernetes.io/service-account.name: vault-exec-operator
type: kubernetes.io/service-account-token
