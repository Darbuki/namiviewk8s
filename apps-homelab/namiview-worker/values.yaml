replicaCount: 1
image:
  repository: 015301735477.dkr.ecr.eu-west-1.amazonaws.com/namiview-worker
  tag: "eks-a5963c6"
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi
storage:
  backend: s3
  s3:
    bucket: namiview-prod-bucket
    region: eu-west-1
imagePullSecrets:
  - name: regcred
aws:
  staticCredentials:
    enabled: true
    secretName: aws-credentials
serviceAccount:
  create: true
  name: namiview-worker
  annotations: {}
jobs:
  queueUrl: "https://sqs.eu-west-1.amazonaws.com/015301735477/namiview-prod-jobs"
app:
  mongo:
    atlas: true
    host: namiview.pj6elop.mongodb.net
    appName: namiview
vault:
  clusterSecretStore: aws-secrets-manager
  refreshInterval: "1h"
  paths:
    mongodb: namiview-prod/mongodb
    mongodbDb: namiview-prod/mongodb
