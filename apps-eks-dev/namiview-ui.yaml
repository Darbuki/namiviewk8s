apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namiview-ui-dev
  namespace: argocd
spec:
  project: namiview
  sources:
    - repoURL: https://github.com/Darbuki/namiview-charts.git
      targetRevision: main
      path: charts/namiview-ui
      helm:
        valueFiles:
          - values.yaml
          - $values/apps-eks-dev/namiview-ui/values.yaml
    - repoURL: https://github.com/Darbuki/namiviewk8s.git
      targetRevision: 88-bootstrap-dev-environment-in-eks-cluster-shape-2
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: namiview-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
