apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namiview-triage
  namespace: argocd
spec:
  project: namiview
  # Two-source pattern (same as namiview-api):
  #   - chart source: namiview-charts repo (structure + defaults)
  #   - values source: this repo (environment-specific overrides)
  sources:
    - repoURL: https://github.com/Darbuki/namiview-charts.git
      targetRevision: 69-set-up-namiview-on-aws
      path: charts/namiview-triage
      helm:
        valueFiles:
          - values.yaml
          - $values/apps-eks/namiview-triage/values.yaml
    - repoURL: https://github.com/Darbuki/namiviewk8s.git
      targetRevision: 69-set-up-namiview-on-aws
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: namiview-agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
