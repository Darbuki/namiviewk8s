apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namiview-ui
  namespace: argocd
spec:
  project: namiview
  sources:
    - repoURL: https://github.com/Darbuki/namiview-charts.git
      targetRevision: 69-set-up-namiview-on-aws
      path: charts/namiview-ui
      helm:
        valueFiles:
          - values.yaml
          - $values/apps-eks/namiview-ui/values.yaml
    - repoURL: https://github.com/Darbuki/namiviewk8s.git
      targetRevision: 69-set-up-namiview-on-aws
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: namiview
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
